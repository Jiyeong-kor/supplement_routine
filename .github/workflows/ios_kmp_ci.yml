name: iOS KMP CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "kmp/**"
      - ".github/workflows/ios_kmp_ci.yml"
  workflow_dispatch:

concurrency:
  group: ios-kmp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-shell:
    name: Shared framework and SwiftUI shell build
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build shared iOS simulator framework
        run: gradle -p kmp :shared:linkDebugFrameworkIosSimulatorArm64 --build-cache --no-daemon

      - name: Build SwiftUI iOS shell
        run: >
          xcodebuild
          -project kmp/iosApp/SupplementRoutineIos.xcodeproj
          -scheme SupplementRoutineIos
          -configuration Debug
          -sdk iphonesimulator
          -destination "generic/platform=iOS Simulator"
          ARCHS=arm64
          ONLY_ACTIVE_ARCH=YES
          CODE_SIGNING_ALLOWED=NO
          build
